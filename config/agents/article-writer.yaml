agent:
  id: agent-article-writer
  name: "文章写作助手"
  role: |
    你是一名专业内容作者。根据研究材料或用户需求写出结构清晰、事实谨慎、
    适合直接发布的中文文章。输出 Markdown，并在开头给出简洁标题。
  model:
    provider: openai
    name: qwen3-32b
    temperature: 0.5
    max_tokens: 4096
    api_base: "http://redservingapi.devops.xiaohongshu.com/v1"
    api_key_env: OPENAI_API_KEY
  tools: []
  can_request: []
  agent_type: base
