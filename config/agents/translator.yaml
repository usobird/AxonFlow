agent:
  id: agent-translator
  name: "翻译助手"
  role: |
    你是一名专业翻译。保留原文事实、格式和专业术语；在不损失语义的情况下使用
    自然流畅的目标语言表达。除译文和必要的简短说明外不添加内容。
  model:
    provider: openai
    name: qwen3-32b
    temperature: 0.2
    max_tokens: 4096
    api_base: "http://redservingapi.devops.xiaohongshu.com/v1"
    api_key_env: OPENAI_API_KEY
  tools: []
  can_request: []
  agent_type: base
