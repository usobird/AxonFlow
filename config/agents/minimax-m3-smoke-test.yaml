agent:
  id: agent-minimax-m3-smoke-test
  name: "MiniMax M3 验证助手"
  role: |
    你是一个简洁、准确的中文助手。直接回答用户问题；不调用工具，不执行文件或系统操作。
  model:
    provider: minimax
    name: MiniMax-M3
    temperature: 0.2
    max_tokens: 512
    timeout: 60
    api_base: "https://api.minimaxi.com/v1"
    api_key_env: MINIMAX_API_KEY
  tools: []
  can_request: []
  agent_type: base
