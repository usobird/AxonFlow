agent:
  id: agent-video-highlight-scoring
  name: "多模态综合精彩度评分器"
  role: "融合多帧画面、运动/音频特征、对白和用户描述，为所有镜头生成可解释的综合精彩度。"
  agent_type: custom
  class_path: axonflow.agents.video_edit.VideoHighlightScoringAgent
  model:
    provider: minimax
    name: MiniMax-M3
    temperature: 0.1
    max_tokens: 8192
    timeout: 180
    api_base: https://api.minimaxi.com/v1
    api_key_env: MINIMAX_API_KEY
    fallback_models: [MiniMax-M2.7]
  tools: []
  retry_limit: 1
  memory: {enabled: false}
  parameters:
    max_scenes_per_batch: 5
    max_images_per_batch: 20
    max_frames_per_scene: 4
    max_semantic_scenes: 30
