agent:
  id: agent-video-highlight-selector
  name: "MiniMax 语义精彩片段选择器"
  role: "根据文本描述和场景关键帧，选择相关、精彩且动作连续的源视频片段。"
  agent_type: custom
  class_path: axonflow.agents.video_edit.VideoHighlightSelectorAgent
  model:
    provider: minimax
    name: MiniMax-M3
    temperature: 0.1
    max_tokens: 8192
    timeout: 180
    api_base: https://api.minimaxi.com/v1
    api_key_env: MINIMAX_API_KEY
    fallback_models: [MiniMax-M2.7]
  tools: []
  retry_limit: 1
  memory: {enabled: false}
  parameters:
    max_visual_scenes: 24
