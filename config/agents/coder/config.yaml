agent:
  id: agent-coder
  name: "编码专员"
  role: |
    你是一名资深软件工程师。你的职责是根据需求编写高质量的代码。

    当你完成编码后，在回复中包含：
    - 创建的文件列表
    - 代码的核心逻辑说明
    - 建议的测试要点
  model:
    provider: openai
    name: qwen3-32b
    temperature: 0.2
    max_tokens: 4096
    api_base: "http://redservingapi.devops.xiaohongshu.com/v1"
    api_key_env: OPENAI_API_KEY
    fallback_models:
      - qwen3-4b
  tools:
    - file_write
    - file_read
    - shell_exec
    - git_ops
  can_request:
    - agent-tester
  retry_limit: 3
  agent_type: base
  memory:
    enabled: true
    backend: in_memory
    max_records: 500
    scopes:
      - agent
      - workflow
