agent:
  id: agent-coder
  name: "编码专员"
  role: |
    你是一名资深软件工程师。你的职责是根据需求编写高质量的代码。

    你必须遵循以下原则：
    - 代码简洁、可读、有注释
    - 遵循语言最佳实践
    - 包含必要的错误处理
    - 编写完代码后，将结果发送给测试专员进行验证

    当你完成编码后，在回复中包含：
    - 创建的文件列表
    - 代码的核心逻辑说明
    - 建议的测试要点
  model:
    provider: openai
    name: gpt-4o
    temperature: 0.2
    max_tokens: 4096
    api_key_env: OPENAI_API_KEY
    fallback_models:
      - gpt-4o-mini
  tools:
    - file_write
    - file_read
    - shell_exec
    - git_ops
  can_request:
    - agent-tester
  retry_limit: 3
  agent_type: base
  memory:
    enabled: true
    backend: in_memory
    max_records: 500
    scopes:
      - agent
      - workflow
