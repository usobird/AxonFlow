workflow:
  id: content-pipeline
  name: "内容创作流水线"
  trigger:
    type: manual

  agents:
    - agent-web-researcher
    - agent-article-writer

  flow:
    entry: agent-web-researcher
    max_iterations: 8
    timeout: 1800

    routes:
      agent-web-researcher:
        - target: agent-article-writer

    terminate_on:
      - agent: agent-article-writer
        status: success

  context:
    output_format: "markdown"
    tone: "professional"
