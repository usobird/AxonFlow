# AxonFlow 全局配置
redis:
  url: "redis://localhost:6379"
  max_connections: 10

sandbox:
  enabled: false
  command_whitelist: []
  blocked_paths:
    - "/etc"
    - "/var"

log_level: "INFO"
log_format: "console"  # console / json
workspace_dir: "./workspace"

# Agent 可用性：启动时并行探测，并按间隔重复探测模型或远程端点
agent_health:
  enabled: true
  interval_seconds: 300
  timeout_seconds: 15

default_model:
  provider: "openai"
  name: "qwen3-32b"
  temperature: 0.7
  max_tokens: 4096
  api_base: "http://redservingapi.devops.xiaohongshu.com/v1"
  api_key_env: "OPENAI_API_KEY"
  fallback_models:
    - "qwen3-4b"

# Token 预算上限（不设置则不限制）
# token_budget: 1000000

webhooks: []
# - url: "https://your-webhook-url.com"
#   events:
#     - "workflow.completed"
#     - "workflow.failed"
